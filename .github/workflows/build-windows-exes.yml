name: Build EXEs

on:
  workflow_dispatch:

  push:
    tags:
      - "v*"
    paths:
      - 'Bluetooth-GUI.py'
      - 'Bluetooth-GUI.spec'
      - 'Media-Sync.py'
      - 'MediaRelay.spec'
      - 'MediaRelay-linux.spec'
      - 'libraries/**'
      - '.github/workflows/build-windows-exes.yml'

  pull_request:
    paths:
      - 'Bluetooth-GUI.py'
      - 'Bluetooth-GUI.spec'
      - 'Media-Sync.py'
      - 'MediaRelay.spec'
      - 'MediaRelay-linux.spec'
      - 'libraries/**'
      - '.github/workflows/build-windows-exes.yml'

jobs:
  # =========================================================
  # Windows builds — Bluetooth GUI + MediaRelay
  # =========================================================
  build-windows:
    runs-on: windows-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Must be >= 3.11 because libraries/media_sync/common.py uses
          # asyncio loop.sock_recvfrom(), which was added in Python 3.11.
          # On 3.10 the receive loop crashes with AttributeError, so the
          # tray app launches but no UDP packets are ever read and clients
          # cannot complete the connect handshake.
          python-version: '3.13'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pystray pillow winrt-Windows.Foundation winrt-Windows.Media winrt-Windows.Media.Control

      # -------------------------
      # Bluetooth GUI
      # -------------------------
      - name: Build Bluetooth GUI EXE
        run: pyinstaller Bluetooth-GUI.spec

      - name: Upload Bluetooth GUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: Bluetooth-GUI-windows
          path: dist/Bluetooth-GUI.exe

      # -------------------------
      # MediaRelay
      # -------------------------
      - name: Build MediaRelay EXE
        run: pyinstaller MediaRelay.spec

      - name: Upload MediaRelay Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: MediaRelay-windows
          path: dist/MediaRelay.exe

  # =========================================================
  # Linux build — MediaRelay bare ELF
  # =========================================================
  build-linux:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libcairo2-dev \
            libgirepository-1.0-dev \
            gir1.2-gtk-3.0 \
            gir1.2-ayatanaappindicator3-0.1 \
            upx

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pystray pillow evdev PyGObject

      - name: Build MediaRelay Linux ELF
        run: pyinstaller MediaRelay-linux.spec

      - name: Upload MediaRelay Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: MediaRelay-linux
          path: dist/MediaRelay-Linux

  # =========================================================
  # Release — generate unified SHA256SUMS and publish
  # =========================================================
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download Bluetooth GUI artifact
        uses: actions/download-artifact@v4
        with:
          name: Bluetooth-GUI-windows
          path: artifacts/

      - name: Download MediaRelay Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: MediaRelay-windows
          path: artifacts/

      - name: Download MediaRelay Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: MediaRelay-linux
          path: artifacts/

      # The auto-updater in Media-Sync.py fetches SHA256SUMS and looks up the
      # running binary's basename. Windows resolves "MediaRelay.exe"; Linux
      # resolves "MediaRelay-Linux". Both must appear in the same file.
      - name: Generate SHA256SUMS
        working-directory: artifacts
        run: |
          sha256sum Bluetooth-GUI.exe MediaRelay.exe MediaRelay-Linux > SHA256SUMS
          echo "--- SHA256SUMS ---"
          cat SHA256SUMS

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/Bluetooth-GUI.exe
            artifacts/MediaRelay.exe
            artifacts/MediaRelay-Linux
            artifacts/SHA256SUMS
