name: Build Windows EXEs

on:
  workflow_dispatch:

  push:
    tags:
      - "v*"
    paths:
      - 'Bluetooth-GUI.py'
      - 'Bluetooth-GUI.spec'
      - 'Media-Sync.py'
      - 'MediaRelay.spec'
      - 'libraries/**'
      - '.github/workflows/build-windows-exes.yml'

  pull_request:
    paths:
      - 'Bluetooth-GUI.py'
      - 'Bluetooth-GUI.spec'
      - 'Media-Sync.py'
      - 'MediaRelay.spec'
      - 'libraries/**'
      - '.github/workflows/build-windows-exes.yml'

jobs:
  build-windows:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Must be >= 3.11 because libraries/media_sync/common.py uses
          # asyncio loop.sock_recvfrom(), which was added in Python 3.11.
          # On 3.10 the receive loop crashes with AttributeError, so the
          # tray app launches but no UDP packets are ever read and clients
          # cannot complete the connect handshake.
          python-version: '3.13'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pystray pillow winrt-Windows.Foundation winrt-Windows.Media winrt-Windows.Media.Control

      # -------------------------
      # Bluetooth GUI - Release
      # -------------------------
      - name: Build Bluetooth GUI EXE (release, no console)
        run: pyinstaller Bluetooth-GUI.spec

      # -------------------------
      # Upload artifacts
      # -------------------------
      - name: Upload Bluetooth GUI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Bluetooth-GUI-windows
          path: |
            dist/Bluetooth-GUI.exe

      # -------------------------
      # Media Sync - Release
      # -------------------------
      - name: Build Media Sync EXE (release, no console)
        run: pyinstaller MediaRelay.spec

      # -------------------------
      # Upload artifacts
      # -------------------------
      - name: Upload Media Sync artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MediaRelay-windows
          path: |
            dist/MediaRelay.exe

      # -------------------------
      # Generate SHA256SUMS for release artifacts
      # -------------------------
      # The auto-updater in Media-Sync.py looks for a SHA256SUMS asset
      # alongside the .exe and refuses to install a download whose hash
      # doesn't match. The file format is one line per artifact in
      # `sha256sum` style: "<hex>  <filename>".
      - name: Generate SHA256SUMS
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $sums = @()
          foreach ($name in @('Bluetooth-GUI.exe','MediaRelay.exe')) {
            $path = Join-Path 'dist' $name
            if (Test-Path $path) {
              $hash = (Get-FileHash -Algorithm SHA256 -Path $path).Hash.ToLower()
              $sums += "$hash  $name"
            }
          }
          $sums | Set-Content -Path 'dist/SHA256SUMS' -Encoding ascii -NoNewline:$false
          Write-Host "--- dist/SHA256SUMS ---"
          Get-Content 'dist/SHA256SUMS'

      # -------------------------
      # Publish to GitHub Release (tag builds only)
      # -------------------------
      - name: Publish EXEs to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Bluetooth-GUI.exe
            dist/MediaRelay.exe
            dist/SHA256SUMS
